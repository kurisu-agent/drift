version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - revive
    - staticcheck
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (io.Writer).Write
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        - name: exported
          disabled: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
