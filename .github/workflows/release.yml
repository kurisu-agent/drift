name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist)'
        required: true

permissions:
  contents: write

jobs:
  test:
    name: test (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Set up Nix cache
        uses: DeterminateSystems/flakehub-cache-action@main

      # `nix develop` gives us the exact toolchain pinned in flake.nix
      # (go 1.26, golangci-lint, govulncheck, devpod, make, git) so local
      # dev and CI run against the same bits. The `-c` form avoids spawning
      # an interactive shell.
      - name: Vet
        run: nix develop --command go vet ./...

      - name: Unit tests (race)
        run: nix develop --command go test -race ./...

      - name: Integration tests
        run: nix develop --command make integration

  release:
    name: goreleaser
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Set up Nix cache
        uses: DeterminateSystems/flakehub-cache-action@main

      # GoReleaser runs outside the devShell: its config embeds ldflags
      # and mod_timestamp that the nix devShell doesn't wire. The action
      # pins its own goreleaser binary; the devShell's goreleaser is for
      # local dry-runs (`make release` equivalent, if we add one).
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
