name: ci

# Temporarily manual-only while the MVP iteration is in flight — see
# commit history. Re-enable push/pull_request triggers once the suite
# runs green against the current devpod-fork pin.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Several cliscript tests invoke `lakitu init`, which emits warnings
      # to stderr when devpod isn't on PATH — those warnings then trip the
      # `! stderr .` assertions. Install the pinned devpod from the flake
      # so CI exercises the same binary lakitu was built against.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build pinned devpod via flake
        run: |
          nix build .#devpod --print-build-logs
          echo "$PWD/result/bin" >> "$GITHUB_PATH"

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.6.0

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vulncheck
        run: govulncheck ./...
