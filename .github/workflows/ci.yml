name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Several cliscript tests invoke `lakitu init`, which emits warnings
      # to stderr when devpod isn't on PATH — those warnings then trip the
      # `! stderr .` assertions. Install the pinned devpod from the flake
      # so CI exercises the same binary lakitu was built against.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build pinned devpod via flake
        run: |
          nix build .#devpod --print-build-logs
          echo "$PWD/result/bin" >> "$GITHUB_PATH"

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race ./...

      # Lint + vulncheck run from `nix develop` so they pick the same
      # toolchain-matched binaries flake.nix pins — golangci-lint-action
      # otherwise lags the Go version we target.
      - name: Lint
        run: nix develop --command golangci-lint run ./...

      - name: Vulncheck
        run: nix develop --command govulncheck ./...

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      # `nix develop` provides the exact toolchain pinned in flake.nix
      # (go, make, git, pinned devpod) so the real-devpod integration
      # tests exercise the same binary lakitu was built against. Same
      # step release.yml runs — catching a regression here means we
      # never ship a broken tag.
      - name: Integration tests
        run: nix develop --command make integration
